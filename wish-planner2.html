<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WISH 숏폼 기획 도우미</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 680px; margin: 0 auto; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 1.5rem; }
  .card { background: #fff; border-radius: 12px; border: 1px solid #e8e8e6; padding: 1.25rem; margin-bottom: 1rem; }
  label { font-size: 13px; color: #666; margin-bottom: 6px; display: block; }
  input[type="password"], input[type="text"] { width: 100%; padding: 9px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; font-family: inherit; outline: none; }
  input:focus { border-color: #888; }
  textarea { width: 100%; min-height: 160px; resize: vertical; font-size: 14px; border: 1px solid #ddd; border-radius: 8px; padding: 10px 12px; font-family: inherit; line-height: 1.6; outline: none; }
  textarea:focus { border-color: #888; }
  select { width: 100%; padding: 9px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; font-family: inherit; background: #fff; outline: none; }
  select:focus { border-color: #888; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; }
  .row > div { flex: 1; min-width: 160px; }
  .btn { background: #1a1a1a; color: #fff; border: none; padding: 11px 22px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
  .btn:hover { background: #333; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-sm { background: #1a1a1a; color: #fff; border: none; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; }
  .btn-sm:hover { background: #333; }
  .btn-outline { background: transparent; color: #888; border: 1px solid #ddd; padding: 8px 14px; border-radius: 8px; font-size: 13px; cursor: pointer; margin-left: 8px; }
  .btn-outline:hover { border-color: #888; color: #1a1a1a; }
  .error { color: #d83a1d; font-size: 13px; margin-top: 8px; }
  .link-bar { display: flex; gap: 8px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .link-chip { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 8px; border: 1px solid #ddd; background: #fff; font-size: 13px; color: #1a1a1a; text-decoration: none; }
  .link-chip:hover { background: #f0f0ee; }
  .key-row { display: flex; gap: 8px; align-items: flex-end; }
  .key-row input { flex: 1; }
  .key-saved { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: #3b6d11; background: #eaf3de; padding: 6px 12px; border-radius: 8px; }
  .result-card { background: #fff; border-radius: 12px; border: 1px solid #e8e8e6; padding: 1.25rem; margin-top: 1.5rem; display: none; }
  .result-title { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .result-concept { font-size: 13px; color: #888; margin-bottom: 1rem; }
  .divider { border: none; border-top: 1px solid #f0f0ee; margin: 1rem 0; }
  .badge { display: inline-block; font-size: 12px; font-weight: 500; padding: 3px 10px; border-radius: 8px; white-space: nowrap; }
  .badge-real { background: #e6f1fb; color: #185fa5; }
  .badge-ai { background: #eeedfe; color: #3c3489; }
  .badge-mix { background: #eaf3de; color: #3b6d11; }
  .section-label { font-size: 12px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .section-gap { margin-bottom: 1.25rem; }
  .hook-box { background: #f5f5f3; border-radius: 8px; padding: 12px 14px; font-size: 14px; line-height: 1.6; border-left: 3px solid #1a1a1a; }
  .scene-item { border: 1px solid #e8e8e6; border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; }
  .scene-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .scene-num { min-width: 22px; height: 22px; border-radius: 50%; background: #1a1a1a; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: #fff; flex-shrink: 0; }
  .scene-desc { font-size: 14px; font-weight: 500; line-height: 1.5; color: #1a1a1a; }
  .scene-dur { color: #aaa; font-size: 12px; font-weight: 400; }
  .scene-meta { display: flex; flex-direction: column; gap: 5px; margin-top: 4px; }
  .scene-meta-row { display: flex; gap: 6px; align-items: flex-start; }
  .scene-meta-label { font-size: 11px; font-weight: 600; color: #fff; padding: 2px 7px; border-radius: 4px; flex-shrink: 0; margin-top: 1px; }
  .label-visual { background: #378add; }
  .label-mood { background: #1d9e75; }
  .label-narration { background: #e07b3a; }
  .label-casual { background: #c45ab3; }
  .label-pace { background: #2a8fa8; }
  .label-sfx { background: #a87f2a; }
  .label-bgm { background: #5a8f3e; }
  .scene-meta-text { font-size: 13px; color: #555; line-height: 1.5; }
  .mood-bar { display: flex; align-items: center; gap: 10px; background: #f5f5f3; border-radius: 8px; padding: 10px 14px; }
  .mood-swatch { width: 20px; height: 20px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.1); flex-shrink: 0; }
  .mood-text { font-size: 13px; color: #444; line-height: 1.5; }
  .narration-box { background: #f5f5f3; border-radius: 8px; padding: 12px 14px; font-size: 14px; line-height: 1.8; white-space: pre-wrap; }
  .copy-btn { margin-left: auto; font-size: 12px; color: #aaa; cursor: pointer; background: none; border: none; padding: 0; display: flex; align-items: center; gap: 4px; white-space: nowrap; }
  .copy-btn:hover { color: #1a1a1a; }
  .chip-row { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { background: #f5f5f3; border: 1px solid #e8e8e6; border-radius: 100px; padding: 3px 10px; font-size: 13px; color: #444; }
  .tip-box { font-size: 13px; color: #666; line-height: 1.7; }
  .header-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 1rem; }
  .dots { display: inline-flex; gap: 4px; align-items: center; }
  .dots span { width: 6px; height: 6px; border-radius: 50%; background: #fff; animation: pulse 1.2s infinite; }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)} }
  #main-area { display: none; }
</style>
</head>
<body>
<div class="container">

  <h1>🎬 WISH 숏폼 기획 도우미</h1>
  <p class="subtitle">공유복지플랫폼 칼럼 → 숏폼 영상 기획안 자동 생성</p>

  <div class="card" id="key-card">
    <label>🔑 Gemini API 키</label>
    <div id="key-input-area">
      <div class="key-row">
        <input type="password" id="api-key-input" placeholder="Gemini API 키 입력">
        <button class="btn-sm" onclick="saveKey()">저장</button>
      </div>
      <div class="error" id="key-error"></div>
    </div>
    <div id="key-saved-area" style="display:none;">
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <span class="key-saved">✓ API 키 저장됨</span>
        <button class="btn-outline" onclick="resetKey()">키 변경</button>
      </div>
    </div>
  </div>

  <div id="main-area">
    <div class="link-bar">
      <a class="link-chip" href="https://wish.welfare.seoul.kr/swflmsfront/board/boardlist.do?bmno=10016&pno=10011" target="_blank">📖 지식칼럼 ↗</a>
      <a class="link-chip" href="https://www.youtube.com/@WelfareSeoul1/" target="_blank">▶ 서울시복지재단TV ↗</a>
    </div>

    <div class="card">
      <div style="margin-bottom:1rem;">
        <label>칼럼 제목</label>
        <input type="text" id="column-title" placeholder="칼럼 제목을 입력하세요 (선택)">
      </div>
      <div style="margin-bottom:1rem;">
        <label>칼럼 본문 붙여넣기</label>
        <textarea id="column-text" placeholder="wish.welfare.seoul.kr 칼럼 본문을 복사해서 여기에 붙여넣으세요."></textarea>
      </div>
      <div class="row">
        <div>
          <label>영상 길이</label>
          <select id="duration">
            <option value="60초 이내 숏폼">60초 이내 숏폼</option>
            <option value="30초 이내 숏폼">30초 이내 숏폼</option>
            <option value="3분 내외 영상">3분 내외 영상</option>
          </select>
        </div>
        <div>
          <label>제작 방식</label>
          <select id="style">
            <option value="자동 추천">자동 추천</option>
            <option value="실사 촬영">실사 촬영</option>
            <option value="AI 영상 생성">AI 영상 생성</option>
            <option value="실사 + AI 혼합">실사 + AI 혼합</option>
          </select>
        </div>
      </div>
      <button class="btn" id="gen-btn" onclick="generate()" style="margin-top:1rem;">✦ 기획안 생성</button>
      <div class="error" id="error-msg"></div>
    </div>

    <div class="result-card" id="result-card"></div>
  </div>

</div>
<script>
function saveKey() {
  const key = document.getElementById('api-key-input').value.trim();
  if (key.length < 10) { document.getElementById('key-error').textContent = 'API 키를 다시 확인해주세요.'; return; }
  localStorage.setItem('gemini_api_key', key);
  document.getElementById('key-error').textContent = '';
  showKeySaved();
  document.getElementById('main-area').style.display = 'block';
}
function showKeySaved() {
  document.getElementById('key-input-area').style.display = 'none';
  document.getElementById('key-saved-area').style.display = 'block';
}
function resetKey() {
  localStorage.removeItem('gemini_api_key');
  document.getElementById('api-key-input').value = '';
  document.getElementById('key-input-area').style.display = 'block';
  document.getElementById('key-saved-area').style.display = 'none';
  document.getElementById('main-area').style.display = 'none';
}
window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('gemini_api_key');
  if (saved) { showKeySaved(); document.getElementById('main-area').style.display = 'block'; }
});

async function generate() {
  const text = document.getElementById('column-text').value.trim();
  if (!text) { document.getElementById('error-msg').textContent = '칼럼 본문을 먼저 붙여넣어 주세요.'; return; }
  document.getElementById('error-msg').textContent = '';
  const duration = document.getElementById('duration').value;
  const style = document.getElementById('style').value;
  const btn = document.getElementById('gen-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="dots"><span></span><span></span><span></span></span> 분석 중...';
  const resultCard = document.getElementById('result-card');
  resultCard.style.display = 'none';

  const systemPrompt = `You are a Korean short-form video planning expert. Respond ONLY with valid JSON, no markdown, no explanation. Be concise — short phrases, not long sentences, in every field.

JSON schema:
{"title":"string","concept":"string","summary":"string(short)","key_sentences":["string","string","string"],"production_type":"string","production_reason":"string(short)","overall_mood":"string","mood_color":"string","hook":"string","scenes":[{"num":1,"desc":"string(short)","duration":"string","visual":"English keywords, vary subject/angle per scene","mood":"string(short)","pace":"string(short, e.g. '빠른 컷')","sfx":"string(short) or empty","bgm_keyword":"English search keyword for Pixabay Music matching this scene's mood, e.g. 'upbeat corporate', 'tense suspense', 'warm acoustic'","narration_formal":"string with **key phrase** wrapped once","narration_casual":"string with **key phrase** wrapped once"}],"ending_scene":{"desc":"string(short)","narration":"mentions wish.welfare.seoul.kr","logo_note":"서울시복지재단+WISH 로고"},"full_narration_formal":"string","full_narration_casual":"string","bgm":"string(short, with bpm)","hashtags":["string"],"caption":"string - Instagram/YouTube post caption, 2-4 sentences with line breaks, friendly tone, ends with a question or call-to-action, includes 1-2 emojis, does NOT repeat hashtags (those go separately)","tips":"string(short, mention WISH 워터마크)"}

Rules:
- Korean only, except visual(English)
- 8-14 scenes, each strictly 2-5 seconds — punchy, fast-cut short-form rhythm. NEVER make a scene longer than 5 seconds. If a message needs more time, split it into 2 scenes instead of extending duration
- production_type: "실사 촬영"|"AI 영상 생성"|"실사 + AI 혼합"
- Each scene's visual differs from others (subject/angle/setting)
- scene 1's narration_formal and narration_casual MUST be based on the hook (same core message as hook, can rephrase slightly for tone match) — the hook IS scene 1's opening line, not a separate line
- hook field: same core hook message, written as a short standalone line
- Output ONLY JSON, nothing else, no truncation`;

  const title_input = document.getElementById('column-title').value.trim();
  const userPrompt = `다음 칼럼을 분석해서 ${duration} 기획안을 만들어주세요.\n제작 방식 선호: ${style}\n씬은 영상 길이에 맞게 적절한 개수로 구성해주세요.\n\n=== 칼럼 제목 ===\n${title_input || '(제목 없음)'}\n\n=== 칼럼 본문 ===\n${text.slice(0, 3000)}`;

  try {
    const apiKey = localStorage.getItem('gemini_api_key');
    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${apiKey}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: systemPrompt + '\n\n' + userPrompt }] }],
        generationConfig: { temperature: 0.7, maxOutputTokens: 16000 }
      })
    });
    const data = await response.json();
    if (data.error) {
      document.getElementById('error-msg').textContent = `API 오류: ${data.error.message}`;
      return;
    }
    const raw = data.candidates[0].content.parts[0].text;
    // JSON 추출 시도
    const jsonMatch = raw.match(/\{[\s\S]*\}/);
    if (!jsonMatch) {
      document.getElementById('error-msg').textContent = `응답 오류: ${raw.slice(0, 100)}`;
      return;
    }
    const plan = JSON.parse(jsonMatch[0]);
    renderResult(plan);
  } catch(e) {
    document.getElementById('error-msg').textContent = `오류: ${e.message} — 다시 시도해 주세요.`;
  } finally {
    btn.disabled = false;
    btn.innerHTML = '✦ 기획안 생성';
  }
}

function emphasize(text) {
  if (!text) return '';
  return text.replace(/\*\*(.+?)\*\*/g, '<span style="color:#d83a1d;font-weight:700;font-size:1.05em;">$1</span>');
}

function getBadge(type) {
  if (!type) return '';
  if (type.includes('AI') && type.includes('실사')) return `<span class="badge badge-mix">${type}</span>`;
  if (type.includes('AI')) return `<span class="badge badge-ai">${type}</span>`;
  return `<span class="badge badge-real">${type}</span>`;
}

function renderResult(p) {
  const card = document.getElementById('result-card');

  const scenesHtml = (p.scenes||[]).map((s,idx)=>`
    <div class="scene-item">
      <div class="scene-header">
        <div class="scene-num">${s.num}</div>
        <div class="scene-desc">${s.desc} <span class="scene-dur">(${s.duration})</span></div>
        ${idx === 0 ? `<span class="badge" style="background:#1a1a1a;color:#fff;margin-left:auto;">⚡ 첫 3초 훅</span>` : ''}
      </div>
      ${idx === 0 && p.hook ? `<div class="hook-box" style="margin-bottom:8px;">🎬 ${p.hook}</div>` : ''}
      <div class="scene-meta">
        <div class="scene-meta-row">
          <span class="scene-meta-label label-visual">영상소스</span>
          <span class="scene-meta-text">${s.visual||''}</span>
        </div>
        <div class="scene-meta-row">
          <span class="scene-meta-label label-mood">무드</span>
          <span class="scene-meta-text">${s.mood||''}</span>
        </div>
        ${s.pace ? `<div class="scene-meta-row">
          <span class="scene-meta-label label-pace">편집속도</span>
          <span class="scene-meta-text">${s.pace}</span>
        </div>` : ''}
        ${s.sfx ? `<div class="scene-meta-row">
          <span class="scene-meta-label label-sfx">효과음</span>
          <span class="scene-meta-text">${s.sfx}</span>
        </div>` : ''}
        ${s.bgm_keyword ? `<div class="scene-meta-row">
          <span class="scene-meta-label label-bgm">BGM</span>
          <span class="scene-meta-text">${s.bgm_keyword} <a href="https://pixabay.com/music/search/${encodeURIComponent(s.bgm_keyword)}/" target="_blank" style="color:#378add;text-decoration:none;font-size:12px;">🔗 Pixabay에서 찾기</a></span>
        </div>` : ''}
        <div class="scene-meta-row">
          <span class="scene-meta-label label-narration">자막(공식)</span>
          <span class="scene-meta-text">${emphasize(s.narration_formal)||'—'}</span>
        </div>
        <div class="scene-meta-row">
          <span class="scene-meta-label label-casual">자막(친구)</span>
          <span class="scene-meta-text">${emphasize(s.narration_casual)||'—'}</span>
        </div>
      </div>
    </div>`).join('');

  const hashHtml = (p.hashtags||[]).map(h=>`<span class="chip">#${h.replace(/^#/,'')}</span>`).join('');
  const swatchColor = p.mood_color || '#888888';

  card.innerHTML = `
    <div class="header-row">
      <div><div class="result-title">${p.title||''}</div><div class="result-concept">${p.concept||''}</div></div>
      ${getBadge(p.production_type)}
    </div>
    <hr class="divider">

    <div class="section-gap">
      <div class="section-label">📋 내용 요약</div>
      <div style="font-size:14px;color:#444;line-height:1.8;background:#f5f5f3;border-radius:8px;padding:12px 14px;">${p.summary||''}</div>
    </div>

    ${p.key_sentences && p.key_sentences.length ? `<div class="section-gap">
      <div class="section-label">💬 핵심 문장</div>
      <div style="display:flex;flex-direction:column;gap:6px;">
        ${p.key_sentences.map(s=>`<div style="display:flex;gap:8px;align-items:flex-start;"><span style="color:#e07b3a;font-weight:700;flex-shrink:0;">✦</span><span style="font-size:14px;color:#1a1a1a;line-height:1.6;">${s}</span></div>`).join('')}
      </div>
    </div>` : ''}
    <hr class="divider">

    <div class="section-gap">
      <div class="section-label">전체 무드 & 컬러톤</div>
      <div class="mood-bar">
        <div class="mood-swatch" style="background:${swatchColor};"></div>
        <div class="mood-text">${p.overall_mood||''}</div>
      </div>
    </div>

    <div class="section-gap">
      <div class="section-label">제작 방식 추천 이유</div>
      <div style="font-size:13px;color:#666;line-height:1.7;">${p.production_reason||''}</div>
    </div>

    <div class="section-gap">
      <div class="section-label">첫 3초 훅</div>
      <div class="hook-box">${p.hook||''}</div>
      <div style="font-size:12px;color:#aaa;margin-top:6px;">↓ 씬 1의 자막으로 그대로 이어집니다</div>
    </div>

    <div class="section-gap">
      <div class="section-label">씬 구성</div>
      ${scenesHtml}
    </div>

    ${p.ending_scene ? `<div class="section-gap">
      <div class="section-label">🏁 엔딩 (고정)</div>
      <div class="scene-item" style="border-color:#c45ab3;background:#fbf5fa;">
        <div class="scene-desc" style="margin-bottom:8px;">${p.ending_scene.desc||''}</div>
        <div class="scene-meta">
          <div class="scene-meta-row">
            <span class="scene-meta-label label-narration">안내자막</span>
            <span class="scene-meta-text">${p.ending_scene.narration||''}</span>
          </div>
          <div class="scene-meta-row">
            <span class="scene-meta-label" style="background:#888;">로고</span>
            <span class="scene-meta-text">${p.ending_scene.logo_note||'서울시복지재단 로고 + WISH 로고 삽입'}</span>
          </div>
        </div>
      </div>
    </div>` : ''}

    <div class="section-gap">
      <div class="section-label">📋 전체 스크립트</div>
      <div style="margin-bottom:8px;">
        <div style="font-size:12px;font-weight:600;color:#e07b3a;margin-bottom:4px;display:flex;align-items:center;justify-content:space-between;">
          자막(공식) ver
          <button class="copy-btn" onclick="copyText(this,'${encodeURIComponent(p.full_narration_formal||'')}')">📋 복사</button>
        </div>
        <div class="narration-box">${p.full_narration_formal||''}</div>
      </div>
      <div>
        <div style="font-size:12px;font-weight:600;color:#c45ab3;margin-bottom:4px;display:flex;align-items:center;justify-content:space-between;">
          자막(친구) ver
          <button class="copy-btn" onclick="copyText(this,'${encodeURIComponent(p.full_narration_casual||'')}')">📋 복사</button>
        </div>
        <div class="narration-box">${p.full_narration_casual||''}</div>
      </div>
    </div>

    <div class="section-gap">
      <div class="section-label">BGM</div>
      <div style="font-size:13px;color:#444;line-height:1.7;">${p.bgm||''}</div>
      <div style="font-size:12px;color:#aaa;margin-top:6px;">💡 씬마다 다른 무드면 위 씬 구성의 BGM 링크를 활용하고, 전체 통일감이 필요하면 이 분위기로 하나만 골라써도 좋아요</div>
    </div>

    ${p.caption ? `<div class="section-gap">
      <div class="section-label" style="display:flex;align-items:center;">
        📝 업로드 캡션
        <button class="copy-btn" onclick="copyText(this,'${encodeURIComponent((p.caption||'') + (p.hashtags ? '\\n\\n' + p.hashtags.map(h=>'#'+h.replace(/^#/,'')).join(' ') : ''))}')">📋 복사</button>
      </div>
      <div class="narration-box">${p.caption}</div>
    </div>` : ''}

    <div class="section-gap">
      <div class="section-label">해시태그</div>
      <div class="chip-row">${hashHtml}</div>
    </div>

    ${p.tips?`<hr class="divider"><div class="section-gap"><div class="section-label">💡 CapCut 제작 팁</div><div class="tip-box">${p.tips}</div></div>`:''}
  `;
  card.style.display = 'block';
  card.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function copyText(btn, encoded) {
  navigator.clipboard.writeText(decodeURIComponent(encoded)).then(()=>{
    btn.textContent='✓ 복사됨';
    setTimeout(()=>{ btn.textContent='📋 복사'; }, 2000);
  });
}
</script>
</body>
</html>
