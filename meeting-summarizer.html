<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>회의 녹음 정리</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F6F2;
    --surface: #FFFFFF;
    --border: #E4E2DA;
    --text: #1A1916;
    --muted: #7A7870;
    --accent: #2C5F8A;
    --accent-light: #EAF1F8;
    --success: #1D7A4A;
    --success-bg: #E8F5EE;
    --danger: #C0392B;
    --danger-bg: #FDECEA;
    --radius: 10px;
    --radius-sm: 6px;
  }

  body {
    font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
    line-height: 1.6;
  }

  .wrap {
    max-width: 680px;
    margin: 0 auto;
  }

  header {
    margin-bottom: 2rem;
  }

  header h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.3px;
    margin-bottom: 4px;
  }

  header p {
    font-size: 14px;
    color: var(--muted);
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem 1.5rem;
    margin-bottom: 1rem;
  }

  .field-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.05em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .key-wrap {
    position: relative;
    margin-bottom: 1rem;
  }

  .key-wrap input[type="password"],
  .key-wrap input[type="text"] {
    width: 100%;
    padding: 9px 36px 9px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-family: 'SF Mono', 'Consolas', monospace;
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }

  .key-wrap input:focus {
    border-color: var(--accent);
  }

  .toggle-eye {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    font-size: 16px;
    padding: 0;
    line-height: 1;
  }

  .upload-zone {
    border: 1.5px dashed var(--border);
    border-radius: var(--radius);
    padding: 2.5rem 1rem;
    text-align: center;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    margin-bottom: 1rem;
  }

  .upload-zone:hover, .upload-zone.drag { background: var(--accent-light); border-color: var(--accent); }

  .upload-zone svg { margin-bottom: 10px; opacity: 0.5; }

  .upload-zone .uz-title { font-size: 15px; font-weight: 500; margin-bottom: 4px; }

  .upload-zone .uz-sub { font-size: 13px; color: var(--muted); }

  #fileInput { display: none; }

  .file-chip {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    margin-bottom: 1rem;
  }

  .file-chip .chip-icon { font-size: 20px; opacity: 0.6; flex-shrink: 0; }

  .file-chip .chip-name { font-size: 14px; font-weight: 500; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .file-chip .chip-size { font-size: 12px; color: var(--muted); white-space: nowrap; flex-shrink: 0; }

  .file-chip .chip-remove { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 18px; padding: 0; flex-shrink: 0; line-height: 1; }

  .run-btn {
    width: 100%;
    padding: 11px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: opacity 0.15s;
  }

  .run-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .run-btn:not(:disabled):hover { opacity: 0.88; }

  .progress-area { margin-top: 1rem; display: none; }

  .p-step {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    font-size: 14px;
    color: var(--muted);
  }

  .p-step.active { color: var(--text); font-weight: 500; }

  .p-step.done { color: var(--success); }

  .p-step .step-icon { width: 20px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .err-box {
    font-size: 13px;
    color: var(--danger);
    background: var(--danger-bg);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    margin-top: 10px;
    display: none;
  }

  .result-section { display: none; }

  .tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 1.25rem;
  }

  .tab-btn {
    padding: 8px 16px;
    font-size: 14px;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    color: var(--muted);
    margin-bottom: -1px;
    font-weight: 400;
    transition: color 0.1s;
  }

  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

  .tab-pane { display: none; }
  .tab-pane.active { display: block; }

  .result-text {
    font-size: 14px;
    line-height: 1.9;
    color: var(--text);
    white-space: pre-wrap;
    word-break: keep-all;
  }

  .transcript-text {
    font-size: 13px;
    line-height: 1.8;
    color: var(--muted);
    white-space: pre-wrap;
    word-break: keep-all;
  }

  .action-row {
    display: flex;
    gap: 8px;
    margin-top: 1.25rem;
    flex-wrap: wrap;
  }

  .act-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    padding: 7px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--bg);
    color: var(--text);
    cursor: pointer;
    transition: background 0.1s;
  }

  .act-btn:hover { background: var(--surface); }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>🎙️ 회의 녹음 정리</h1>
    <p>음성 파일을 올리면 요약과 회의록을 자동으로 만들어드려요</p>
  </header>

  <div class="card">
    <div class="field-label">OpenAI API 키</div>
    <div class="key-wrap">
      <input type="password" id="openaiKey" placeholder="sk-..." autocomplete="off" oninput="checkReady()" />
      <button class="toggle-eye" onclick="toggleKey()" title="키 보기/숨기기">👁</button>
    </div>

    <div class="field-label">회의 녹음 파일</div>
    <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()"
         ondragover="event.preventDefault(); this.classList.add('drag')"
         ondragleave="this.classList.remove('drag')"
         ondrop="event.preventDefault(); this.classList.remove('drag'); handleDrop(event)">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      <div class="uz-title">클릭하거나 파일을 여기에 드래그</div>
      <div class="uz-sub">mp3 · mp4 · wav · m4a · ogg · webm / 최대 25MB</div>
    </div>
    <input type="file" id="fileInput" accept=".mp3,.mp4,.wav,.m4a,.ogg,.webm" onchange="handleFile(this.files[0])" />

    <div class="file-chip" id="fileChip" style="display:none">
      <span class="chip-icon">🎵</span>
      <span class="chip-name" id="chipName"></span>
      <span class="chip-size" id="chipSize"></span>
      <button class="chip-remove" onclick="removeFile()" title="파일 제거">✕</button>
    </div>

    <button class="run-btn" id="runBtn" disabled onclick="run()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      회의 내용 정리하기
    </button>

    <div class="err-box" id="errBox"></div>

    <div class="progress-area" id="progressArea">
      <div class="p-step" id="ps1">
        <div class="step-icon"><span class="spinner"></span></div>
        음성 → 텍스트 변환 중…
      </div>
      <div class="p-step" id="ps2" style="opacity:0.35">
        <div class="step-icon">○</div>
        AI 분석 중…
      </div>
    </div>
  </div>

  <div class="card result-section" id="resultSection">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('summary', this)">회의 요약</button>
      <button class="tab-btn" onclick="switchTab('minutes', this)">전체 회의록</button>
      <button class="tab-btn" onclick="switchTab('transcript', this)">원본 텍스트</button>
    </div>

    <div class="tab-pane active" id="pane-summary">
      <div class="result-text" id="summaryText"></div>
    </div>
    <div class="tab-pane" id="pane-minutes">
      <div class="result-text" id="minutesText"></div>
    </div>
    <div class="tab-pane" id="pane-transcript">
      <div class="transcript-text" id="transcriptText"></div>
    </div>

    <div class="action-row">
      <button class="act-btn" onclick="copyActive(this)">📋 복사</button>
      <button class="act-btn" onclick="downloadActive()">⬇️ 텍스트 저장</button>
    </div>
  </div>

</div>
<script>
  let file = null;
  let store = { summary: '', minutes: '', transcript: '' };
  let activeTab = 'summary';

  function toggleKey() {
    const el = document.getElementById('openaiKey');
    el.type = el.type === 'password' ? 'text' : 'password';
  }

  function checkReady() {
    const key = document.getElementById('openaiKey').value.trim();
    document.getElementById('runBtn').disabled = !(file && key.startsWith('sk-'));
  }

  function handleDrop(e) {
    const f = e.dataTransfer.files[0];
    if (f) handleFile(f);
  }

  function handleFile(f) {
    if (!f) return;
    if (f.size > 25 * 1024 * 1024) { showErr('파일 크기가 25MB를 초과합니다.'); return; }
    file = f;
    document.getElementById('uploadZone').style.display = 'none';
    document.getElementById('fileChip').style.display = 'flex';
    document.getElementById('chipName').textContent = f.name;
    document.getElementById('chipSize').textContent = (f.size / 1024 / 1024).toFixed(1) + ' MB';
    checkReady();
  }

  function removeFile() {
    file = null;
    document.getElementById('fileInput').value = '';
    document.getElementById('fileChip').style.display = 'none';
    document.getElementById('uploadZone').style.display = 'block';
    checkReady();
  }

  function showErr(msg) {
    const el = document.getElementById('errBox');
    el.textContent = '⚠️ ' + msg;
    el.style.display = 'block';
  }

  function hideErr() { document.getElementById('errBox').style.display = 'none'; }

  function setStep(n) {
    const s1 = document.getElementById('ps1');
    const s2 = document.getElementById('ps2');
    if (n === 1) {
      s1.innerHTML = '<div class="step-icon"><span class="spinner"></span></div> 음성 → 텍스트 변환 중…';
      s1.className = 'p-step active'; s2.style.opacity = '0.35';
    } else if (n === 2) {
      s1.innerHTML = '<div class="step-icon">✅</div> 음성 → 텍스트 완료';
      s1.className = 'p-step done';
      s2.innerHTML = '<div class="step-icon"><span class="spinner"></span></div> AI가 회의 내용 분석 중…';
      s2.className = 'p-step active'; s2.style.opacity = '1';
    } else if (n === 3) {
      s2.innerHTML = '<div class="step-icon">✅</div> 분석 완료!';
      s2.className = 'p-step done';
    }
  }

  async function run() {
    const key = document.getElementById('openaiKey').value.trim();
    hideErr();
    document.getElementById('resultSection').style.display = 'none';
    document.getElementById('progressArea').style.display = 'block';
    document.getElementById('runBtn').disabled = true;
    setStep(1);

    try {
      const fd = new FormData();
      fd.append('file', file);
      fd.append('model', 'whisper-1');
      fd.append('language', 'ko');

      const wRes = await fetch('https://api.openai.com/v1/audio/transcriptions', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + key },
        body: fd
      });
      if (!wRes.ok) {
        const e = await wRes.json().catch(() => ({}));
        throw new Error('Whisper 오류: ' + (e.error?.message || 'API 키를 확인해주세요 (' + wRes.status + ')'));
      }
      const wData = await wRes.json();
      store.transcript = wData.text || '';
      setStep(2);

      const cRes = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'anthropic-version': '2023-06-01' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1000,
          messages: [{
            role: 'user',
            content: `아래는 회의 녹음을 텍스트로 변환한 내용입니다. 두 섹션으로 나눠 정리해주세요.

[SUMMARY]
■ 회의 목적
(1~2문장으로 간결하게)

■ 핵심 논의 사항
• (주요 내용 3~5개)

■ 결정 사항
• (합의/결정된 내용)

■ 액션 아이템
• (담당자 또는 주체 — 해야 할 일)

[MINUTES]
회의 흐름에 따라 전체 내용을 단락별로 정리해주세요. 발언자 구분이 어려우면 시간 순서로 내용을 나눠 작성하세요. 최대한 구체적이고 완전하게 작성해주세요.

---
회의 내용:
${store.transcript}`
          }]
        })
      });
      if (!cRes.ok) {
        const e = await cRes.json().catch(() => ({}));
        throw new Error('Claude 오류: ' + (e.error?.message || cRes.status));
      }
      const cData = await cRes.json();
      const full = (cData.content || []).map(b => b.text || '').join('');
      const sm = full.match(/\[SUMMARY\]([\s\S]*?)(?=\[MINUTES\]|$)/);
      const mm = full.match(/\[MINUTES\]([\s\S]*?)$/);
      store.summary = sm ? sm[1].trim() : full;
      store.minutes = mm ? mm[1].trim() : '';

      setStep(3);
      document.getElementById('summaryText').textContent = store.summary;
      document.getElementById('minutesText').textContent = store.minutes;
      document.getElementById('transcriptText').textContent = store.transcript;
      document.getElementById('resultSection').style.display = 'block';
      switchTab('summary', document.querySelector('.tab-btn'));

    } catch (err) {
      showErr(err.message);
      document.getElementById('progressArea').style.display = 'none';
    } finally {
      document.getElementById('runBtn').disabled = false;
      checkReady();
    }
  }

  function switchTab(name, btn) {
    activeTab = name;
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    document.getElementById('pane-' + name).classList.add('active');
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
  }

  function copyActive(btn) {
    navigator.clipboard.writeText(store[activeTab] || '').then(() => {
      const orig = btn.textContent;
      btn.textContent = '✅ 복사됨!';
      setTimeout(() => { btn.textContent = orig; }, 2000);
    });
  }

  function downloadActive() {
    const text = store[activeTab] || '';
    const labels = { summary: '요약', minutes: '회의록', transcript: '원본텍스트' };
    const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    const date = new Date().toISOString().slice(0, 10);
    a.download = `회의_${labels[activeTab]}_${date}.txt`;
    a.click();
    URL.revokeObjectURL(a.href);
  }
</script>
</body>
</html>
