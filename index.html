<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>밴드 게시글 다듬기</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F6F4F1;
  --surface: #FFFFFF;
  --border: #E5E1DA;
  --border-strong: #CCC8BF;
  --text-1: #1C1917;
  --text-2: #6B6560;
  --text-3: #A09A93;
  --green: #3D6B37;
  --green-light: #EAF2E8;
  --green-mid: #6A9E64;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 18px;
}

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text-1);
  min-height: 100vh;
  padding-bottom: 5rem;
}

.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 1.5rem;
  height: 56px;
  display: flex;
  align-items: center;
  gap: 10px;
  position: sticky;
  top: 0;
  z-index: 20;
}
.logo {
  width: 30px; height: 30px;
  background: var(--green);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.logo svg { width: 16px; height: 16px; }
.header-title { font-size: 15px; font-weight: 600; }
.header-org { margin-left: auto; font-size: 12px; color: var(--text-3); white-space: nowrap; }

.wrap { max-width: 680px; margin: 0 auto; padding: 2rem 1.25rem 0; }

.hero { text-align: center; padding: 2rem 0 1.75rem; }
.hero h1 { font-size: clamp(22px, 5vw, 28px); font-weight: 600; line-height: 1.4; margin-bottom: 0.6rem; }
.hero h1 em { font-style: normal; color: var(--green); }
.hero p { font-size: 14px; color: var(--text-2); line-height: 1.7; }

.style-preview {
  display: flex; align-items: center; justify-content: center;
  flex-wrap: wrap; gap: 8px;
  margin-top: 1.1rem;
}
.sp-item { display: flex; align-items: center; gap: 5px; }
.sp-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.sp-name { font-size: 13px; color: var(--text-2); }
.sp-div { font-size: 13px; color: var(--text-3); }

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.25rem 1.4rem;
  margin-bottom: 0.9rem;
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
}

.lbl {
  font-size: 13px; font-weight: 500;
  color: var(--text-2);
  margin-bottom: 8px;
  display: flex; align-items: center; gap: 6px;
}
.tag { font-size: 11px; padding: 2px 8px; border-radius: 100px; }
.tag-req { background: var(--green-light); color: var(--green); }
.tag-opt { background: #EDEBE6; color: var(--text-3); }

textarea, input[type=text] {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 13px;
  font-size: 14px;
  font-family: 'Noto Sans KR', sans-serif;
  color: var(--text-1);
  background: var(--bg);
  transition: border-color 0.15s, background 0.15s;
  line-height: 1.7;
}
textarea { resize: vertical; }
textarea:focus, input[type=text]:focus { outline: none; border-color: var(--green-mid); background: #fff; }
textarea::placeholder, input::placeholder { color: var(--text-3); }
.char { font-size: 12px; color: var(--text-3); text-align: right; margin-top: 5px; }

.g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
@media(max-width:480px){ .g2 { grid-template-columns: 1fr; } }

.run-btn {
  width: 100%;
  padding: 13px;
  background: var(--green);
  color: #fff;
  border: none;
  border-radius: var(--radius-md);
  font-size: 15px; font-weight: 600;
  font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  margin-bottom: 1.5rem;
  transition: opacity 0.15s, transform 0.1s;
}
.run-btn:hover { opacity: 0.88; }
.run-btn:active { transform: scale(0.99); }
.run-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

.spin {
  width: 17px; height: 17px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: rot 0.65s linear infinite;
}
@keyframes rot { to { transform: rotate(360deg); } }

.skel-wrap { display: flex; flex-direction: column; gap: 0.9rem; }
.skel-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.25rem 1.4rem;
}
.skel-line {
  height: 12px; border-radius: 6px;
  background: linear-gradient(90deg, #EDEAE5 25%, #F5F3EF 50%, #EDEAE5 75%);
  background-size: 200%;
  animation: shim 1.4s infinite;
  margin-bottom: 9px;
}
@keyframes shim { to { background-position: -200% center; } }

.section-label {
  font-size: 12px; font-weight: 500;
  color: var(--text-3);
  letter-spacing: 0.07em;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.notice-box {
  display: flex; align-items: flex-start; gap: 8px;
  background: #FFFBEB;
  border: 1px solid #FDE68A;
  border-radius: var(--radius-md);
  padding: 10px 14px;
  font-size: 13px; color: #92400E;
  line-height: 1.6;
  margin-bottom: 0.9rem;
}

.result-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.25rem 1.4rem;
  margin-bottom: 0.9rem;
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  animation: up 0.28s ease both;
}
.result-card:nth-child(2){ animation-delay:.0s }
.result-card:nth-child(3){ animation-delay:.08s }
.result-card:nth-child(4){ animation-delay:.16s }
@keyframes up { from { opacity:0; transform:translateY(7px); } to { opacity:1; transform:translateY(0); } }

.result-top {
  display: flex; align-items: flex-start;
  justify-content: space-between; gap: 12px;
  padding-bottom: 11px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 12px;
}
.style-name {
  font-size: 14px; font-weight: 600;
  display: flex; align-items: center; gap: 7px;
  margin-bottom: 3px;
}
.dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink:0; }
.style-desc { font-size: 12px; color: var(--text-3); }

.copy-btn {
  flex-shrink: 0;
  padding: 5px 13px;
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-sm);
  background: var(--bg);
  color: var(--text-2);
  font-size: 13px; font-weight: 500;
  font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer;
  display: flex; align-items: center; gap: 5px;
  transition: background 0.12s;
}
.copy-btn:hover { background: #EDEBE6; }
.copy-btn.ok { color: var(--green); border-color: var(--green-mid); background: var(--green-light); }

.result-text { font-size: 14px; line-height: 1.85; color: var(--text-1); white-space: pre-wrap; }

.err {
  background: #FEF2F2; border: 1px solid #FECACA;
  border-radius: var(--radius-md);
  padding: 1rem 1.25rem;
  font-size: 13px; color: #B91C1C;
  white-space: pre-wrap; word-break: break-all;
}
</style>
</head>
<body>

<header class="header">
  <div class="logo">
    <svg viewBox="0 0 16 16" fill="none">
      <path d="M2 4h12M2 8h8M2 12h10" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/>
    </svg>
  </div>
  <span class="header-title">밴드 게시글 다듬기</span>
  <span class="header-org">부산뇌병변복지관</span>
</header>

<div class="wrap">
  <div class="hero">
    <h1>활동 소식을<br><em>더 풍성하게</em> 전하세요</h1>
    <p>원고를 붙여넣으면 AI가 3가지 스타일로 다듬어드립니다</p>
    <div class="style-preview">
      <div class="sp-item"><span class="sp-dot" style="background:#6A9E64"></span><span class="sp-name">따뜻하고 정감 있는 글</span></div>
      <span class="sp-div">/</span>
      <div class="sp-item"><span class="sp-dot" style="background:#8B6F47"></span><span class="sp-name">깔끔하고 정돈된 글</span></div>
      <span class="sp-div">/</span>
      <div class="sp-item"><span class="sp-dot" style="background:#4A7EA5"></span><span class="sp-name">생동감 있는 글</span></div>
    </div>
  </div>

  <div class="card">
    <div class="lbl">원본 글 <span class="tag tag-req">필수</span></div>
    <textarea id="original" rows="7" placeholder="작성하신 원고를 여기에 붙여넣어 주세요..."></textarea>
    <div class="char"><span id="cc">0</span>자</div>
  </div>

  <div class="card">
    <div class="lbl">보조 정보 <span class="tag tag-opt">선택사항</span></div>
    <div class="g2">
      <div><div class="lbl">활동명</div><input type="text" id="name" placeholder="예: 보치아 프로그램"></div>
      <div><div class="lbl">날짜</div><input type="text" id="date" placeholder="예: 6월 4일(목)"></div>
    </div>
    <div class="g2">
      <div><div class="lbl">장소</div><input type="text" id="place" placeholder="예: 복지관 1층 강당"></div>
      <div><div class="lbl">참여자·대상</div><input type="text" id="who" placeholder="예: 보치아 프로그램 참여자"></div>
    </div>
    <div><div class="lbl">기타 메모</div><input type="text" id="note" placeholder="추가로 포함했으면 하는 내용을 입력해주세요"></div>
  </div>

  <button class="run-btn" id="runBtn" onclick="run()">
    ✦ 3가지 스타일로 다듬기
  </button>

  <div id="results"></div>
</div>

<script>
const API_KEY = "AQ.Ab8RN6KcRrL0cuTX2AtfDxcTdY_Qj1uclSXVEquSWgFB7MVwzw";

const STYLES = [
  { dot: "#6A9E64", name: "따뜻하고 정감 있는 글", desc: "현장의 온기와 감동이 느껴지는 따뜻한 문체" },
  { dot: "#8B6F47", name: "깔끔하고 정돈된 글",   desc: "명확하고 전문적인 공식 보고 스타일" },
  { dot: "#4A7EA5", name: "생동감 있는 글",        desc: "현장감과 활력이 넘치는 생생한 문체" },
];

document.getElementById("original").addEventListener("input", function () {
  document.getElementById("cc").textContent = this.value.length;
});

function getExtras() {
  const fields = [
    ["날짜", "date"], ["활동명", "name"],
    ["장소", "place"], ["참여자", "who"], ["기타", "note"],
  ];
  return fields
    .map(([l, id]) => { const v = document.getElementById(id).value.trim(); return v ? `- ${l}: ${v}` : ""; })
    .filter(Boolean).join("\n");
}

function skeleton() {
  return `<div class="skel-wrap">${[0,1,2].map(() => `
    <div class="skel-card">
      <div class="skel-line" style="width:38%;margin-bottom:14px"></div>
      <div class="skel-line" style="width:100%"></div>
      <div class="skel-line" style="width:92%"></div>
      <div class="skel-line" style="width:85%"></div>
      <div class="skel-line" style="width:60%"></div>
    </div>`).join("")}</div>`;
}

async function run() {
  const original = document.getElementById("original").value.trim();
  if (!original) { alert("원본 글을 입력해주세요."); return; }

  const btn = document.getElementById("runBtn");
  btn.disabled = true;
  btn.innerHTML = '<div class="spin"></div> 다듬는 중...';
  document.getElementById("results").innerHTML = skeleton();

  const extras = getExtras();
  const prompt = `당신은 장애인복지관의 활동 소식을 밴드·뉴스레터용으로 다듬는 전문 작성가입니다.

아래 원본 글을 바탕으로, 다음 4가지 요소를 자연스럽게 담아 3가지 스타일로 다듬어주세요:
1. 언제, 어디서, 누구와 어떤 활동을 했는지
2. 참여자들이 어떤 경험을 했는지
3. 활동을 통해 어떤 의미가 있었는지
4. 앞으로 어떻게 이어갈 계획인지 (자연스럽게 마무리)

[원본 글]
${original}${extras ? "\n\n[보조 정보]\n" + extras : ""}

반드시 아래 JSON 형식으로만 답하세요. 마크다운 코드블록 없이 순수 JSON만 출력하세요:
{"styles":[{"name":"따뜻하고 정감 있는 글","description":"현장의 온기와 감동이 느껴지는 따뜻한 문체","text":"내용"},{"name":"깔끔하고 정돈된 글","description":"명확하고 전문적인 공식 보고 스타일","text":"내용"},{"name":"생동감 있는 글","description":"현장감과 활력이 넘치는 생생한 문체","text":"내용"}]}`;

  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash-latest
:generateContent?key=${API_KEY}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: { temperature: 0.8, maxOutputTokens: 2048 },
      }),
    });

    const data = await res.json();
    if (!res.ok) {
      document.getElementById("results").innerHTML = `<div class="err">API 오류 (${res.status})\n${data?.error?.message || JSON.stringify(data)}</div>`;
      return;
    }

    const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
    const clean = raw.replace(/```json|```/g, "").trim();
    let parsed;
    try { parsed = JSON.parse(clean); }
    catch (e) {
      document.getElementById("results").innerHTML = `<div class="err">응답 파싱 실패\n${raw}</div>`;
      return;
    }
    renderResults(parsed.styles);

  } catch (e) {
    document.getElementById("results").innerHTML = `<div class="err">네트워크 오류\n${e.message}</div>`;
  } finally {
    btn.disabled = false;
    btn.innerHTML = "✦ 다시 다듬기";
  }
}

function renderResults(styles) {
  document.getElementById("results").innerHTML = `
    <p class="section-label">다듬어진 글 · 3가지 스타일</p>
    <div class="notice-box">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none" style="flex-shrink:0;margin-top:1px">
        <circle cx="7.5" cy="7.5" r="6.5" stroke="currentColor" stroke-width="1.2"/>
        <path d="M7.5 5v3.5M7.5 10.5v.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
      AI가 작성한 초안입니다. 내용을 꼭 읽어보신 후, 실제 상황에 맞게 다듬어서 활용해 주세요.
    </div>
    ${styles.map((s, i) => {
      const m = STYLES[i] || { dot: "#888", name: s.name, desc: s.description };
      return `
      <div class="result-card">
        <div class="result-top">
          <div>
            <div class="style-name"><span class="dot" style="background:${m.dot}"></span>${s.name}</div>
            <div class="style-desc">${s.description}</div>
          </div>
          <button class="copy-btn" onclick="doCopy(this,'rt${i}')">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
              <rect x="3.5" y="3.5" width="7.5" height="7.5" rx="1.5" stroke="currentColor" stroke-width="1.2"/>
              <path d="M2 9.5V2h7.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
            </svg>복사
          </button>
        </div>
        <div class="result-text" id="rt${i}">${esc(s.text)}</div>
      </div>`;
    }).join("")}`;
}

function doCopy(btn, id) {
  navigator.clipboard.writeText(document.getElementById(id).textContent).then(() => {
    btn.classList.add("ok");
    btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 6.5l3.5 3.5 5.5-6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>복사됨`;
    setTimeout(() => {
      btn.classList.remove("ok");
      btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="3.5" y="3.5" width="7.5" height="7.5" rx="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M2 9.5V2h7.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>복사`;
    }, 2000);
  });
}

function esc(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
</script>
</body>
</html>
